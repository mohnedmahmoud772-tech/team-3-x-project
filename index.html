<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <h1 id="welcTxt" class="animate-on-load">Easily make your own to-do list.</h1>
    <p id="teamText" class="animate-on-load">Brought to you by El Fala7een©</p>
    <div class="animate-on-load">
    <div class="formClass">
<form id="signup-form">
    <h2 id="createTxt">Create your account.</h2>
    <div class="form-text">
        <label for="username">Username:</label> 
        <div class="input">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" name="username" required placeholder="Enter username:"><br>
        </div>
        <label for="email">Email:</label>
        <div class="input">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="email" name="email" required placeholder="Enter email:"><br>
        </div>
        <label for="password">Password:</label>
        <div class="input">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" name="password" required placeholder="Enter password:"><br>
        </div>

        <a href="index (2).html"><button type="button" id="signup-btn">Create Account</button></a>
        <button type="button" id="login-btn">Already have an account? <a href="login.html" style="color: #32D7FF; text-decoration: none;">Log in</a></button>
    </div>
    </div>
</div>
</form>
<footer>

</footer>
